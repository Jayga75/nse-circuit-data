name: Update Circuit Data

on:
  schedule:
    # GitHub cron is UTC. 12:45 UTC = 6:15 PM IST, Mon-Fri (after NSE publishes the file)
    - cron: "45 12 * * 1-5"
    # backup run an hour later in case NSE was late or the first run failed
    - cron: "45 13 * * 1-5"
  workflow_dispatch: # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scraper
        run: node scraper.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add circuits.json
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "Update circuits.json ($(date -u +%F))"
          git push
